<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#050816;
overflow-x:hidden;
color:white;
}

/* PARTICLES */
.particles{
position:fixed;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.particles span{
position:absolute;
width:6px;
height:6px;
background:#38bdf8;
border-radius:50%;
animation:move 15s linear infinite;
opacity:0.4;
}

@keyframes move{
0%{transform:translateY(100vh) scale(0);}
100%{transform:translateY(-10vh) scale(1.5);}
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 50px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(15px);
z-index:1000;
}

nav h1{
color:#38bdf8;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
transition:0.3s;
}

nav a:hover{
color:#38bdf8;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero img{
width:180px;
height:180px;
border-radius:50%;
border:4px solid #38bdf8;
object-fit:cover;
box-shadow:0 0 40px #38bdf8;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

.hero h1{
font-size:50px;
margin-top:15px;
background:linear-gradient(90deg,#38bdf8,#a78bfa);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
color:#cbd5e1;
margin-top:10px;
}

/* BUTTON */
.btn{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#38bdf8,#a78bfa);
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* SOCIAL */
.section{
padding:80px 40px;
text-align:center;
}

.title{
font-size:30px;
margin-bottom:40px;
color:#38bdf8;
}

/* SOCIAL GRID */
.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
width:180px;
padding:20px;
background:rgba(255,255,255,0.06);
border-radius:20px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
transition:0.3s;
text-align:center;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 0 20px #38bdf8;
}

.card i{
font-size:30px;
margin-bottom:10px;
color:#38bdf8;
}

.card a{
color:white;
text-decoration:none;
display:block;
margin-top:5px;
}

/* WHATSAPP */
.whatsapp{
margin-top:40px;
}

.whatsapp a{
display:inline-block;
padding:12px 20px;
border-radius:30px;
background:#25D366;
color:white;
text-decoration:none;
font-weight:bold;
}
